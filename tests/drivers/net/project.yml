---
:project:
  :use_exceptions: FALSE
  :use_test_preprocessor: TRUE
  :use_auxiliary_dependencies: TRUE
  :build_root: build
  :test_file_prefix: test_
  :which_ceedling: gem
  :ceedling_version: 0.31.1
  :default_tasks:
    - test:all

:environment:

:extension:
  :executable: .out

:paths:
  :test:
    - +:test/**
    - -:test/support
  :source:
    - ../../../drivers/net/standard_spi/
    - ../../../drivers/net/oa_tc6/
    - -:../../../drivers/net/oa_tc6/oa_tc6.c
    - ../../../drivers/net/utilities/
    - ../../../util/
    - test/support/
    - -:../../../capi/src/**
  :include:
    - test/support
    - ../../../include
    - ../../../capi/inc
    - ../../../capi/platform/stm32
    - ../../../drivers/net/standard_spi
    - ../../../drivers/net/oa_tc6
    - ../../../drivers/net/utilities
  :support:
    - test/support
  :libraries: []

:defines:
  :common: &common_defines []
  :test:
    - *common_defines
    - TEST
    - CONFIG_OA_ZERO_SWO_ONLY=0
  :test_preprocess:
    - *common_defines
    - TEST
    - CONFIG_OA_ZERO_SWO_ONLY=0

:cmock:
  :mock_prefix: mock_
  :when_no_prototypes: :warn
  :enforce_strict_ordering: TRUE
  :plugins:
    - :ignore
    - :ignore_arg
    - :callback
    - :return_thru_ptr
    - :expect_any_args
  :treat_as:
    uint8:    HEX8
    uint16:   HEX16
    uint32:   UINT32
    int8:     INT8
    bool:     UINT8

:gcov:
  :reports:
    - HtmlDetailed
  :gcovr:
    :html_medium_threshold: 75
    :html_high_threshold: 90

:libraries:
  :placement: :end
  :flag: "-l${1}"
  :path_flag: "-L ${1}"
  :system: []
  :test: []
  :release: []

:plugins:
  :load_paths:
    - "#{Ceedling.load_path}"
  :enabled:
    - stdout_pretty_tests_report
    - module_generator
